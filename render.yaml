services:
  - type: web
    name: daily-apps-lab
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: daily-apps-lab-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: daily-apps-lab-db
    plan: free
    databaseName: daily_apps_lab
    user: daily_apps_lab
